# Общий reverse-proxy для ВСЕХ локальных проектов на базе skeleton.
# Запускается один раз на машину: make proxy-up. Слушает :80 и маршрутизирует
# по хосту <project>.localhost / api.<project>.localhost на нужный контейнер.
# Дашборд: http://localhost:8080 (dev-режим, без авторизации).

name: shared-proxy

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: proxy
