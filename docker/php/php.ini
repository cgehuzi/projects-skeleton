; Базовая конфигурация PHP для приложения (dev + prod).
; OPcache для prod переопределяется отдельным файлом opcache.prod.ini.

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_vars = 5000

date.timezone = UTC

expose_php = Off

; Реалистичный realpath cache ускоряет автозагрузку Composer.
realpath_cache_size = 4096k
realpath_cache_ttl = 600
