; Пул php-fpm. Логи пишем в stdout/stderr, чтобы их собирал Docker.
; user/group НЕ задаём: процесс всегда стартует не от root (dev — через `user:`
; в compose, prod — через `USER www-data`), поэтому setuid не нужен.
[www]
listen = 9000

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

clear_env = no

catch_workers_output = yes
decorate_workers_output = no
access.log = /proc/self/fd/2
