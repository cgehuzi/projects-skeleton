# Боевой edge: единый домен. Статика и `/api`/`/admin`/`/livewire` → php-fpm,
# всё остальное (публичный сайт) → Next SSR. TLS терминируется внешним LB/прокси.

server {
    listen 80 default_server;
    server_name _;

    root /var/www/backend/public;
    index index.php;

    client_max_body_size 64m;

    # ── Laravel / Filament / API → php-fpm ──────────────────────────────────
    location = /up        { try_files $uri /index.php?$query_string; }
    location ^~ /api/      { try_files $uri /index.php?$query_string; }
    location ^~ /admin     { try_files $uri /index.php?$query_string; }
    location ^~ /livewire/ { try_files $uri /index.php?$query_string; }

    # ── Статика Laravel/Filament (физические файлы в public/) ───────────────
    location ^~ /build/   { try_files $uri =404; access_log off; expires 1y; }
    location ^~ /storage/ { try_files $uri =404; }
    location ~ ^/(css|js|fonts)/filament/ { try_files $uri =404; access_log off; expires 1y; }

    # ── PHP ─────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    # ── Всё остальное (публичный сайт) → Next SSR ───────────────────────────
    location / {
        proxy_pass http://node:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
