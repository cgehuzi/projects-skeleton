# nginx проекта обслуживает только Laravel (php-fpm). Публичный сайт (Next.js)
# проксирует напрямую Traefik. Маршрутизацией по хосту занимается Traefik,
# поэтому здесь один default_server, принимающий любой Host:
#   - извне:    api.<project>.localhost (через Traefik)
#   - изнутри:  api-internal (server-side обращения Next, см. compose alias)

upstream backend_php {
    server php:9000;
}

server {
    listen 80 default_server;
    server_name _;

    root /var/www/backend/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend_php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
