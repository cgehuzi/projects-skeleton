# Сборка и публикация боевых образов в GHCR по тегу версии (v*).
# Образы: <ghcr>/<repo>/php|node|nginx:<tag>. На деплое их остаётся только pull'ить.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io/${{ github.repository }}
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production images
        run: docker compose -f compose.prod.yaml build

      - name: Push images
        run: docker compose -f compose.prod.yaml push
